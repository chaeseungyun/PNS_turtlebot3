# keepout_zones.yaml — 라이다가 못 보는 장애물을 '월드 좌표(m, map 프레임)'로 정의.
#
# 왜? TB3 라이다는 ~0.18m 높이의 수평 한 면만 스캔한다. 책상 상판/의자 좌판은
# 그 면 '위'에 있어 라이다에 안 잡힌다(거리를 틀리게 재는 게 아니라 안 보임).
# → costmap에 keepout으로 박아 플래너가 그 위로 경로를 내지 못하게 한다.
# AMCL이 쓰는 지도(office_clean)는 건드리지 않으므로 위치추정 품질은 그대로.
#
# 좌표 얻는 법(로봇/RViz 켜진 뒤):
#   RViz 상단 "Publish Point" 클릭 → 책상 모서리 클릭 → 터미널에 좌표 출력:
#     ros2 topic echo /clicked_point
#   또는 ros2 run tf2_ros tf2_echo map base_link 로 로봇을 책상 옆에 두고 읽기.
#
# 좌표 채운 뒤 마스크 재생성:
#   ros2 run my_nav2 make_keepout_mask.py \
#     --base ~/maps/office_clean.yaml \
#     --zones $(ros2 pkg prefix my_nav2)/share/my_nav2/config/keepout_zones.yaml \
#     --out  $(ros2 pkg prefix my_nav2)/share/my_nav2/map/keepout_mask
#   (소스 수정 시엔 colcon build 후 위 경로로. 빠른 반복은 src 경로로 직접 실행도 가능)
#
# 형식:
#   - rect:   직사각형. min=[x_min,y_min], max=[x_max,y_max]  (책상에 적합)
#   - circle: 원.       center=[x,y], radius=r                 (의자/기둥에 적합)
# 좌표는 map 프레임 기준 미터. office_clean 맵 범위: x∈[-4.26, 14.09], y∈[-9.6, 4.55].

zones: []   # ⚠️ PLACEHOLDER — 비어 있으면 keepout 없음(전부 통행가능).
            # 실제 좌표를 아래 예시처럼 채워라:
            #
            # - name: desk_1
            #   type: rect
            #   min: [1.2, 0.4]
            #   max: [2.0, 1.3]
            # - name: chair_A
            #   type: circle
            #   center: [0.8, -0.5]
            #   radius: 0.35
